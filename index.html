<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACHIN LABS - ULTRA PRO</title>

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background: radial-gradient(circle,#1a0033,#000);
  color:#fff;
  text-align:center;
}

.card{
  width:95%;
  max-width:420px;
  margin:10px auto;
  padding:12px;
  background:#111;
  border-radius:12px;
}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.grid img{width:50px;border-radius:50%;cursor:pointer;}

.circle-container{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
}
.circle{
  width:44px;height:44px;
  border-radius:50%;
  background:#222;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}

.btn{
  width:100%;
  padding:10px;
  border:0;
  border-radius:8px;
  margin-top:8px;
}
.yellow{background:#ffcc00;color:#000;}
.dark{background:#333;color:#fff;}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup-content{
  background:#111;
  padding:20px;
  border-radius:10px;
}

.result img{
  width:60px;
  border-radius:50%;
  margin:5px;
}

.best{
  border:3px solid gold;
}
</style>
</head>

<body>

<div class="card">
<h2>SACHIN LABS 🔥 ULTRA PRO</h2>
</div>

<div class="card">
<div id="circles" class="circle-container"></div>
<button class="btn dark" onclick="removeLast()">← Back</button>
<button class="btn dark" onclick="resetAll()">Reset</button>
</div>

<div class="card">
<div id="grid" class="grid"></div>
</div>

<div class="card">
<button class="btn yellow" onclick="start()">START PREDICTION</button>
</div>

<div id="popup" class="popup">
<div class="popup-content">
<div id="result" class="result"></div>
<div id="confidence"></div>
</div>
</div>

<script>
let input=[];
const circlesDiv=document.getElementById("circles");

// init circles
for(let i=20;i>=1;i--){
  let d=document.createElement("div");
  d.className="circle";
  d.innerText=i+"th";
  circlesDiv.appendChild(d);
}

// grid
const grid=document.getElementById("grid");
for(let i=0;i<=9;i++){
  let img=document.createElement("img");
  img.src="assets/"+i+".png";
  img.onclick=()=>select(i);
  grid.appendChild(img);
}

function select(n){
  if(input.length<20){
    input.push(n);
    saveHistory(n);
    update();
  }
}

function update(){
  let c=circlesDiv.children;
  for(let i=0;i<20;i++){
    if(input[i]!=undefined){
      c[i].innerHTML="<img src='assets/"+input[i]+".png' width='100%'>";
    }else{
      c[i].innerText=(20-i)+"th";
    }
  }
}

function removeLast(){
  input.pop();
  update();
}

function resetAll(){
  input=[];
  update();
}

// 🔥 LOCAL STORAGE LEARNING
function saveHistory(n){
  let h=JSON.parse(localStorage.getItem("history")||"[]");
  h.push(n);
  if(h.length>200) h.shift();
  localStorage.setItem("history",JSON.stringify(h));
}

// 🔥 ULTRA AI
function predict(nums){
  let score=Array(10).fill(0);
  let n=nums.length;
  let last=nums[n-1];

  // recent heavy
  for(let i=0;i<n;i++){
    let w=5;
    if(i>=n-3) w=30;
    else if(i>=n-6) w=20;
    score[nums[i]]+=w;
  }

  // freq
  let f=Array(10).fill(0);
  nums.forEach(x=>f[x]++);
  for(let i=0;i<10;i++) score[i]+=f[i]*5;

  // markov
  for(let i=0;i<n-1;i++){
    if(nums[i]==last){
      score[nums[i+1]]+=25;
    }
  }

  // pair pattern
  if(n>=2){
    let a=nums[n-2],b=nums[n-1];
    for(let i=0;i<n-2;i++){
      if(nums[i]==a && nums[i+1]==b){
        score[nums[i+2]]+=20;
      }
    }
  }

  // history learning
  let hist=JSON.parse(localStorage.getItem("history")||"[]");
  for(let i=0;i<hist.length-1;i++){
    if(hist[i]==last){
      score[hist[i+1]]+=10;
    }
  }

  // avoid repeat
  score[last]-=20;

  // normalize
  let total=score.reduce((a,b)=>a+b,0);
  let prob=score.map(x=>x/total);

  return prob;
}

function start(){
  if(input.length<20){
    alert("Enter 20 values");
    return;
  }

  let prob=predict(input);

  // pick top 3
  let arr=prob.map((p,i)=>({num:i,p:p}));
  arr.sort((a,b)=>b.p-a.p);

  show(arr.slice(0,3));
  resetAll();
}

function show(list){
  let res=document.getElementById("result");
  let conf=document.getElementById("confidence");

  res.innerHTML="";
  list.forEach((x,i)=>{
    let img=document.createElement("img");
    img.src="assets/"+x.num+".png";
    if(i==0) img.classList.add("best");
    res.appendChild(img);
  });

  conf.innerHTML=
    "Best: "+list[0].num+" ("+(list[0].p*100).toFixed(1)+"%)";

  document.getElementById("popup").style.display="flex";
  setTimeout(()=>popup.style.display="none",3000);
}

update();
</script>

</body>
</html>
