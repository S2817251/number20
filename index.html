<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>my predicter - 3 Results</title>

<style>
:root{
  --accent:#ffcc00;
  --bg-start:#1a0033;
  --bg-end:#000;
}
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background: radial-gradient(circle at top, var(--bg-start), var(--bg-end));
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

.card{
  width:95%;
  max-width:420px;
  background: rgba(20,20,20,0.9);
  border-radius:12px;
  padding:12px;
  margin:8px 0;
  text-align:center;
}

.logo{ width:84px; height:84px; border-radius:50%; margin:8px auto; display:block;}
.title{ color:var(--accent); font-weight:700; font-size:20px; }
.subtitle{ font-size:14px; margin-bottom:6px; }

/* 🔥 scroll fix for 20 inputs */
.circle-container{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:8px;
  justify-items:center;
  margin:10px 0;
  max-height:220px;
  overflow-y:auto;
}

.circle{
  width:44px; height:44px;
  border-radius:50%;
  background: rgba(60,60,60,0.45);
  border:1.5px solid #ff00ff;
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
}
.circle img{ width:100%; height:100%; }

.grid{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:10px;
}
.grid img{
  width:52px; height:52px;
  border-radius:50%;
  cursor:pointer;
}
.grid img.clicked{ transform:scale(1.2); }

.btn{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:0;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.btn-yellow{ background:#ffcc00; color:#000; }
.btn-dark{ background:#222; color:#fff; }

.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  align-items:center;
  justify-content:center;
}
.popup-content{
  background:#111;
  padding:18px;
  border-radius:12px;
  text-align:center;
}

.result-images{
  display:flex;
  gap:12px;
  justify-content:center;
}
.result-images img{
  width:64px;
  height:64px;
  border-radius:50%;
}

.error{ color:#ff6666; }
</style>
</head>

<body>

<div class="card">
  <img src="logo.png" class="logo">
  <div class="title">SACHIN LABS</div>
</div>

<div class="card">
  <div class="subtitle">Enter last 20 results (20th → 1st)</div>
  <div id="inputCircles" class="circle-container"></div>
  <button class="btn btn-dark" onclick="removeLast()">← Back</button>
</div>

<div class="card">
  <div id="numberGrid" class="grid"></div>
</div>

<div class="card">
  <button class="btn btn-yellow" onclick="startPrediction()">Start</button>
</div>

<div id="resultPopup" class="popup">
  <div class="popup-content">
    <div id="resultImages" class="result-images"></div>
    <div id="popupMessage"></div>
  </div>
</div>

<script>
const inputCircles = document.getElementById('inputCircles');
const numberGrid = document.getElementById('numberGrid');
const resultPopup = document.getElementById('resultPopup');
const resultImages = document.getElementById('resultImages');
const popupMessage = document.getElementById('popupMessage');

let userInput = [];

// 🔥 create 20 circles
const labels = [
"20th","19th","18th","17th","16th",
"15th","14th","13th","12th","11th",
"10th","9th","8th","7th","6th",
"5th","4th","3rd","2nd","1st"
];

labels.forEach(l=>{
  const div=document.createElement('div');
  div.className="circle";
  div.textContent=l;
  inputCircles.appendChild(div);
});

// 🔢 number buttons
for(let d=0; d<=9; d++){
  const img=document.createElement('img');
  img.src=`assets/${d}.png`;
  img.onclick=()=>selectNumber(d,img);
  numberGrid.appendChild(img);
}

function selectNumber(num,el){
  if(userInput.length<20){
    userInput.push(num);
    updateCircles();
  }
  el.classList.add('clicked');
  setTimeout(()=>el.classList.remove('clicked'),120);
}

function removeLast(){
  userInput.pop();
  updateCircles();
}

function updateCircles(){
  const circles=inputCircles.children;
  for(let i=0;i<20;i++){
    if(userInput[i]!=undefined){
      circles[i].innerHTML=`<img src="assets/${userInput[i]}.png">`;
    }else{
      circles[i].textContent=labels[i];
    }
  }
}

function startPrediction(){
  if(userInput.length<20){
    showError("Enter 20 results first!");
    return;
  }
  const res=generatePrediction(userInput);
  showResult(res);

  userInput=[];
  updateCircles();
}

// 🔥 ADVANCED LOGIC
function generatePrediction(nums){
  const score=Array(10).fill(0);
  const n=nums.length;

  for(let i=0;i<n;i++){
    let w=i+1;
    if(i>=n-5) w+=6;
    else if(i>=n-10) w+=3;

    score[nums[i]]+=w;

    if(i>0 && nums[i]==nums[i-1]) score[nums[i]]+=4;
  }

  // frequency
  nums.forEach(d=>score[d]+=2);

  // avg
  const avg=Math.round(nums.slice(-5).reduce((a,b)=>a+b)/5)%10;
  score[avg]+=5;

  const result=[];
  const used=new Set();

  for(let k=0;k<3;k++){
    let best=-1,bs=-999;
    for(let d=0;d<10;d++){
      if(!used.has(d)&&score[d]>bs){
        bs=score[d];
        best=d;
      }
    }
    result.push(best);
    used.add(best);
  }

  return result;
}

function showResult(pred){
  resultImages.innerHTML="";
  pred.forEach(d=>{
    const img=document.createElement('img');
    img.src=`assets/${d}.png`;
    resultImages.appendChild(img);
  });
  popupMessage.textContent="Next Results";
  resultPopup.style.display="flex";
  setTimeout(()=>resultPopup.style.display="none",3000);
}

function showError(msg){
  resultImages.innerHTML="";
  popupMessage.className="error";
  popupMessage.textContent=msg;
  resultPopup.style.display="flex";
  setTimeout(()=>{
    resultPopup.style.display="none";
    popupMessage.className="";
  },2000);
}

updateCircles();
</script>

</body>
</html>
