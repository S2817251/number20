<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Number Predictor</title>

<style>
:root{
  --accent:#ffcc00;
  --bg-start:#1a0033;
  --bg-end:#000;
}

body{
  margin:0;
  font-family:Poppins, sans-serif;
  background: radial-gradient(circle at top, var(--bg-start), var(--bg-end));
  color:#fff;

  display:flex;
  flex-direction:column;
  align-items:center;

  height:100vh;
  overflow-y:auto;
}

.card{
  width:100%;
  max-width:420px;
  background: rgba(20,20,20,0.9);
  border-radius:12px;
  padding:10px;
  margin:6px 0;
  text-align:center;
}

.logo{
  width:80px;
  height:80px;
  border-radius:50%;
  margin:auto;
}

.title{
  color:var(--accent);
  font-weight:700;
}

.subtitle{
  font-size:13px;
}

/* circles */
.circle-container{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:6px;
  margin:8px 0;
  max-height:180px;
  overflow-y:auto;
}

.circle{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
}
.circle img{
  width:100%;
  height:100%;
}

/* number grid */
.grid{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
}
.grid img{
  width:44px;
  height:44px;
  border-radius:50%;
  cursor:pointer;
}
.grid img.clicked{
  transform:scale(1.2);
}

/* buttons */
.btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:0;
  margin-top:6px;
  font-weight:700;
}
.btn-yellow{
  background:#ffcc00;
  color:#000;
}
.btn-dark{
  background:#222;
  color:#fff;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
}
.popup-content{
  background:#111;
  padding:16px;
  border-radius:10px;
}

.result-images{
  display:flex;
  gap:10px;
  justify-content:center;
}
.result-images img{
  width:50px;
  height:50px;
  border-radius:50%;
}

.error{
  color:#ff6666;
}

</style>
</head>

<body>

<div class="card">
  <img src="logo.png" class="logo">
  <div class="title">Number HACK</div>
</div>

<div class="card">
  <div class="subtitle">Enter last 20 results</div>

  <!-- ✅ FIXED CIRCLES (APK SAFE) -->
  <div id="inputCircles" class="circle-container">
    <div class="circle">20th</div><div class="circle">19th</div>
    <div class="circle">18th</div><div class="circle">17th</div>
    <div class="circle">16th</div><div class="circle">15th</div>
    <div class="circle">14th</div><div class="circle">13th</div>
    <div class="circle">12th</div><div class="circle">11th</div>
    <div class="circle">10th</div><div class="circle">9th</div>
    <div class="circle">8th</div><div class="circle">7th</div>
    <div class="circle">6th</div><div class="circle">5th</div>
    <div class="circle">4th</div><div class="circle">3rd</div>
    <div class="circle">2nd</div><div class="circle">1st</div>
  </div>

  <button class="btn btn-dark" onclick="removeLast()">← Back</button>
</div>

<div class="card">
  <div id="numberGrid" class="grid"></div>
</div>

<div class="card">
  <button class="btn btn-yellow" onclick="startPrediction()">Start</button>
</div>

<div id="resultPopup" class="popup">
  <div class="popup-content">
    <div id="resultImages" class="result-images"></div>
    <div id="popupMessage"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const inputCircles = document.getElementById('inputCircles').children;
const numberGrid = document.getElementById('numberGrid');
const resultPopup = document.getElementById('resultPopup');
const resultImages = document.getElementById('resultImages');
const popupMessage = document.getElementById('popupMessage');

let userInput = [];

const labels = [
"20th","19th","18th","17th","16th",
"15th","14th","13th","12th","11th",
"10th","9th","8th","7th","6th",
"5th","4th","3rd","2nd","1st"
];

// create numbers
for(let d=0; d<=9; d++){
  const img=document.createElement('img');
  img.src=`assets/${d}.png`;
  img.onclick=()=>selectNumber(d,img);
  numberGrid.appendChild(img);
}

function selectNumber(num,el){
  if(userInput.length<20){
    userInput.push(num);
    updateCircles();
  }
  el.classList.add('clicked');
  setTimeout(()=>el.classList.remove('clicked'),120);
}

function removeLast(){
  userInput.pop();
  updateCircles();
}

function updateCircles(){
  for(let i=0;i<20;i++){
    if(userInput[i]!=undefined){
      inputCircles[i].innerHTML=`<img src="assets/${userInput[i]}.png">`;
    }else{
      inputCircles[i].textContent=labels[i];
    }
  }
}

function startPrediction(){
  if(userInput.length<20){
    showError("Enter 20 results first!");
    return;
  }

  const result = generatePrediction(userInput);
  showResult(result);

  userInput=[];
  updateCircles();
}

function generatePrediction(nums){
  const score=Array(10).fill(0);
  const n=nums.length;

  for(let i=0;i<n;i++){
    let w=i+1;
    if(i>=n-5) w+=6;
    else if(i>=n-10) w+=3;

    score[nums[i]]+=w;

    if(i>0 && nums[i]==nums[i-1]) score[nums[i]]+=4;
  }

  nums.forEach(d=>score[d]+=2);

  const avg=Math.round(nums.slice(-5).reduce((a,b)=>a+b)/5)%10;
  score[avg]+=5;

  const result=[];
  const used=new Set();

  for(let k=0;k<3;k++){
    let best=-1,bs=-999;
    for(let d=0;d<10;d++){
      if(!used.has(d) && score[d]>bs){
        bs=score[d];
        best=d;
      }
    }
    result.push(best);
    used.add(best);
  }

  return result;
}

function showResult(pred){
  resultImages.innerHTML="";
  pred.forEach(d=>{
    const img=document.createElement('img');
    img.src=`assets/${d}.png`;
    resultImages.appendChild(img);
  });
  popupMessage.textContent="Next Results";
  resultPopup.style.display="flex";

  setTimeout(()=>resultPopup.style.display="none",3000);
}

function showError(msg){
  resultImages.innerHTML="";
  popupMessage.className="error";
  popupMessage.textContent=msg;
  resultPopup.style.display="flex";

  setTimeout(()=>{
    resultPopup.style.display="none";
    popupMessage.className="";
  },2000);
}

updateCircles();

});
</script>

</body>
</html>
